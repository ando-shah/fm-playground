defaults:
  - base_dataset

dataset_type: fmow
task: classification
dataset_name: fmow_qbge #for band_ids
num_classes: 62
num_channels: 4
keep_sensors: ['QUICKBIRD02', 'GEOEYE01']
#random bands generated by BinSample across 21 bins
# band_ids: [0, 15, 23, 30, 39, 52, 54, 69, 73, 81, 94, 107, 114, 123, 132, 142, 148, 154, 169, 175, 191]
data_path: ${oc.env:DATASETS_DIR}
image_resolution: 224
multilabel: false
senpamae_channels: #senpamae SRF has only 10 channels (S2-10/20m), so indexes below are relative to that list
  - 0
  - 1
  - 2
  - 6

senpamae_srf_name: rfs_sentinel2_a.npy
#above:
# mapping WV -> S2-10/20m
# B1 -> B1 [X]
# B2 -> B2 [0] (blue)
# B3 -> B3 [1] (green)
# B5 -> B4 [2] (red)
#..
# B7 -> B8 [6] (NIR)